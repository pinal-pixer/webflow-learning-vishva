<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="Practice\pinalmaam\css\email.css" />
    <title>Email Template</title>
  </head>

  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f6f6f6;
    "
  >
    <!-- Wrapper -->
    <table class="table-container">
      <tr>
        <td align="center">
          <!-- Main Container -->
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="background: #ffffff"
            width="100%"
            height="100%"
          >
            <!-- Header -->
            <tr>
              <td style="padding: 15px">
                <table width="100%">
                  <tr>
                    <td width="60">
                      <img
                        src="PinalMa'am/html/Asset/Team.png"
                        width="60"
                        height="60"
                      />
                    </td>
                    <td>
                      <h2 style="margin: 0">Teamcamp</h2>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Navigation -->
            <tr>
              <td
                style="
                  padding: 10px 15px;
                  border-top: 1px solid #ddd;
                  border-bottom: 1px solid #ddd;
                "
              >
                <table width="100%">
                  <tr>
                    <td>
                      <a
                        href="#"
                        style="
                          margin-right: 15px;
                          text-decoration: none;
                          color: #333;
                        "
                        >Learn More</a
                      >
                      <a
                        href="#"
                        style="
                          margin-right: 15px;
                          text-decoration: none;
                          color: #333;
                        "
                        >Contact Us</a
                      >
                      <a href="#" style="text-decoration: none; color: #333"
                        >About Us</a
                      >
                    </td>

                    <td align="right">
                      <span
                        style="
                          background: red;
                          color: white;
                          padding: 3px 8px;
                          border-radius: 50%;
                          font-size: 12px;
                        "
                        >5</span
                      >
                      <img
                        src="PinalMa'am/html/Asset/Team.png"
                        width="40"
                        style="vertical-align: middle; margin-left: 5px"
                      />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Features -->
            <tr>
              <td style="padding: 20px">
                <table width="100%">
                  <tr>
                    <td width="33%" style="padding: 10px; text-align: center">
                      <h3>Feature 1</h3>
                      <p>Fast performance</p>
                    </td>

                    <td width="33%" style="padding: 10px; text-align: center">
                      <h3>Feature 2</h3>
                      <p>Secure system</p>
                    </td>

                    <td width="33%" style="padding: 10px; text-align: center">
                      <h3>Feature 3</h3>
                      <p>24/7 support</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- About Section -->
            <tr>
              <td style="padding: 20px; border-top: 1px solid #ddd">
                <table width="100%">
                  <tr>
                    <td width="200">
                      <img src="https://picsum.photos/300/200" width="100%" />
                    </td>

                    <td style="padding-left: 20px">
                      <h3>About Us</h3>
                      <p>We provide modern solutions.</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  background: #333;
                  color: white;
                  text-align: center;
                  padding: 15px;
                "
              >
                <p style="margin: 0">Facebook | Instagram | LinkedIn</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
