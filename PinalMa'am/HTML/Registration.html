<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Contact Form</h1>
    <form action="Registration.html" method="post">
         <fieldset>
            <legend>Contact Information</legend>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required><br>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password"  maxlength="8" placeholder="Enter your password"><br>


<input type="radio" id="Female" name="Gender" value="Female">
        <label for="Female">Female</label>
        <input type="radio" id="Other" name="Gender" value="Other">
        <label for="Other">Other</label><br>
        
        <label for="checkbox">Interests</label>
        <input type="checkbox" id="checkbox" name="checkbox">Web Development<br>
        <input type="checkbox" id="checkbox" name="checkbox">Mobile Development<br>
        <input type="checkbox" id="checkbox" name="checkbox">Desktop Development<br>
        <input type="checkbox" id="checkbox" name="checkbox">Game Development<br>
        <input type="checkbox" id="checkbox" name="checkbox">AI Development<br>

        <lable for="Photo">Photo:</lable>
        <input type="file" id="Photo" name="Photo" accept="image/*"><br>

        <lable for="checkbox">Terms and Conditions</lable>
        <input type="checkbox" id="checkbox" name="checkbox"><br>

        <label for="submit">Submit</label>
        <input type="submit" id="submit" name="submit">

        <label for="reset">Reset</label>
        <input type="reset" id="reset" name="reset">

        </fieldset>
    
    </form>
</body>
</html>
