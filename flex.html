  <head>
    <meta charset="UTF-8" />

    <title>Document</title>
    <style>
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background-color: #f1f1f1;
        .nav-logo {
          display: flex;
          img {
            width: 50px;
            height: 50px;
          }
        }
      }
      .nav-links {
        display: flex;
        justify-content: center;
        gap: 40px;
        a {
          text-decoration: none;
          color: #000;
          &:hover {
            color: #eb0808;
          }
        }
      }

      .sign-up-button {
        display: flex;
      }
      .notification {
        background-color: #555;
        color: white;
        text-decoration: none;
        padding: 10px 26px;
        position: relative;
        display: inline-block;
        border-radius: 28px;
      }

      .notification:hover {
        background: rgb(202, 202, 202);
      }

      .notification .badge {
        position: absolute;
        top: -10px;
        right: -10px;
        padding: 5px 10px;
        border-radius: 80%;
        background-color: black;
        color: white;
      }
      .hero {
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        gap: 20px;

        .hero-content {
          display: flex;
          flex-direction: column;
          margin-right: auto;
          gap: 10px;
        }
        .hero-image {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          justify-content: flex-end;
          gap: 10px;
        }
        .hero-button {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          justify-content: flex-end;
          gap: 10px;
        }
      }
      * {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* Float four columns side by side */
.column {
  float: left;
  width: 25%;
  padding: 0 10px;
  justify-content: center;
}

/* Remove extra left and right margins, due to padding */
.row {display: flex; 
    flex-wrap: wrap;
    width: 100%;
    gap: 100px;
    justify-content: center;
}

/* Clear floats after the columns */

/* Cards should be 3 per row on wide screens, 2 per row on medium, 1 per row on small */
/* Responsive columns */
@media only screen and (max-width: 768px) {
  .column {
    width: 100%;
    display: block;
    margin-bottom: 20px;
  }
}
.card {
  box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
  padding: 16px;
  text-align: center;
  background-color: #f1f1f1;
  align-items: stretch;
  width: 360px;
  margin-top: 50px;
}
 .svg{
            opacity: 1;
            &:hover{
                opacity: 0.3;
            }
        }
    </style>
