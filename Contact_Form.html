<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <h1>Contact Form</h1>
    <form action="Contact_Form.html" method="post">
         <fieldset>
            <legend>Contact Information</legend>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password"  maxlength="8" placeholder="Enter your password" required><br>

        <label for="number">Phone Number:</label>
        <input type="number" id="number" name="number"maxlength="10" placeholder="Enter your phone number"><br>

        <lable for="date">Date:</lable>
        <input type="date" id="date" name="date" placeholder="Enter your date"><br>

        <label for="Gender">Gender:</label>
        <input type="radio" id="Male" name="Gender" value="Male">
        <label for="Male">Male</label>
        <input type="radio" id="Female" name="Gender" value="Female">
        <label for="Female">Female</label>
        <input type="radio" id="Other" name="Gender" value="Other">
        <label for="Other">Other</label><br>

        <label for="Message">Message:</label>
        <textarea id="Message" name="Message" placeholder="Enter your message"></textarea><br>

        <label for="submit">Submit:</label>
        <input type="submit" id="submit" name="submit"><br>

        <label for="reset">Reset:</label>
        <input type="reset" id="reset" name="reset"><br>
        </fieldset>
    </form>
</body>
</html>
