<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <h2>Contact Form</h2>
    <p>We'd love to hear from you! Reserve a table, send feedback, or just say hello.</p>
    <form>
        <fieldset>
            <legend>Your Details</legend>
            <label for="fullName"> Full Name*</label><br>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your name" required><br><br>

            <label for="email"> Email*</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

            <label for="phone"> Phone Number</label><br>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" maxlength="10"><br><br>

        </fieldset>
        <fieldset>
            <legend>Your Message</legend>
            <label for="subject">Subject</label><br>
            <select id="subject" name="subject">
                <option value="">— Select a topic —</option>
                <option value="reservation">Reservation</option>
                <option value="feedback">Feedback</option>
                <option value="general">General Inquiry</option>
            </select><br><br>
            
            <label for="message">Message*</label><br>
            <textarea id="message" name="message" placeholder="Your message..." rows="5" required></textarea><br><br>

            <label for="submit"></label>
            <input type="submit" id="submit" name="submit" value="Send Message">
            
            <label for="reset"></label>
            <input type="reset" id="reset" name="reset" value="Clear Form">
            
            
        </fieldset>
    </form>
    
</body>
</html>
