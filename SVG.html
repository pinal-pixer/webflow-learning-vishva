<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG</title>
</head>
<body>
   <svg width="400" height="400" viewBox="0 0 200 200">



  <!-- Sky background -->
  <rect width="100%" height="100%" fill="powderblue" />

  <!-- using opacity to make the sun semi-transparent -->
   <circle cx="40" cy="40" r="20" fill="orange" opacity="0.5" />

  <!-- Main House Body -->
  <rect x="50" y="100" width="100" height="80" fill="#f4a460" stroke="#000" stroke-width="2" />
  
  <!-- Roof -->
  <polygon points="50,100 150,100 100,50" fill="#a52a2a" stroke="#000" stroke-width="2" />
  
  <!-- Door -->
  <rect x="85" y="140" width="30" height="40" fill="#8b4513" stroke="#000" />
  
  <!-- Windows -->
  <rect x="60" y="115" width="20" height="20" fill="#fff" stroke="#000" />
  <rect x="120" y="115" width="20" height="20" fill="#fff" stroke="#000" />
  
  <!-- Grass -->
  <rect x="0" y="180" width="200" height="50" fill="#8B4513" />
  <line x1="0" y1="180" x2="200" y2="180" stroke="darkgreen" stroke-width="6" />

</svg>
</body>
</html>
